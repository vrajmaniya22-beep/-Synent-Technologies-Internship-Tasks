<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in or create an account for Aura — your intelligent workspace for modern teams." />
  <title>Aura — Access Your Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background blurs -->
  <div class="ambient" aria-hidden="true">
    <div class="ambient__orb ambient__orb--1"></div>
    <div class="ambient__orb ambient__orb--2"></div>
    <div class="ambient__orb ambient__orb--3"></div>
  </div>

  <!-- Subtle grid overlay -->
  <div class="grid-overlay" aria-hidden="true"></div>

  <div class="page" id="page">

    <!-- Brand mark -->
    <header class="brand" id="brand-header">
      <a href="#" class="brand__logo" id="brand-logo">
        <div class="brand__icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="4" fill="currentColor" opacity="0.6"/>
            <path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        Aura
      </a>
    </header>

    <!-- Main Card Container -->
    <main class="auth-card" id="auth-card">
      <div class="auth-card__inner" id="auth-inner">

        <!-- ==================== LOGIN VIEW ==================== -->
        <div class="auth-view auth-view--login" id="view-login">
          <div class="auth-card__header">
            <h1 class="auth-card__title">Welcome back</h1>
            <p class="auth-card__sub">Sign in to continue to your workspace</p>
          </div>

          <!-- Social login (Login) -->
          <div class="social-grid">
            <button class="social-btn" type="button" aria-label="Sign in with Google">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
              </svg>
            </button>
            <button class="social-btn" type="button" aria-label="Sign in with Apple">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M16.42 13.56c-.02-2.32 1.9-3.44 1.98-3.49-1.08-1.58-2.76-1.8-3.38-1.82-1.44-.14-2.81.85-3.55.85-.73 0-1.86-.83-3.05-.81-1.55.02-2.98.9-3.79 2.29-1.63 2.83-.42 7.02 1.18 9.32.78 1.13 1.7 2.4 2.91 2.36 1.17-.05 1.62-.76 3.04-.76 1.41 0 1.83.76 3.06.74 1.25-.02 2.05-1.15 2.81-2.27.88-1.28 1.25-2.52 1.27-2.58-.02-.01-2.43-.93-2.46-3.83zM14.28 5.61c.64-.78 1.08-1.87.96-2.96-1.01.04-2.2.67-2.86 1.45-.59.69-1.12 1.8-.98 2.87 1.12.09 2.23-.58 2.88-1.36z"/>
              </svg>
            </button>
            <button class="social-btn" type="button" aria-label="Sign in with Facebook">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
              </svg>
            </button>
            <button class="social-btn" type="button" aria-label="Sign in with GitHub">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21.5c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"/>
              </svg>
            </button>
          </div>

          <div class="divider">
            <span>or sign in with email</span>
          </div>

          <!-- Login Form -->
          <form class="auth-form" id="login-form" autocomplete="on">
            <div class="field" id="login-email-field">
              <label class="field__label" for="login-email">Email address</label>
              <div class="field__input-wrap">
                <svg class="field__icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <input type="email" id="login-email" class="field__input" placeholder="you@example.com" required autocomplete="email" />
              </div>
            </div>

            <div class="field" id="login-password-field">
              <div class="field__top">
                <label class="field__label" for="login-password">Password</label>
                <a href="#" class="field__forgot">Forgot password?</a>
              </div>
              <div class="field__input-wrap">
                <svg class="field__icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 11V7a4 4 0 018 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg>
                <input type="password" id="login-password" class="field__input" placeholder="Enter your password" required autocomplete="current-password" />
                <button type="button" class="field__toggle" aria-label="Toggle password visibility">
                  <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/></svg>
                  <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
              </div>
            </div>

            <button type="submit" class="btn-primary">
              <span class="btn-primary__text">Sign in</span>
              <svg class="btn-primary__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <div class="btn-primary__loader"><span></span><span></span><span></span></div>
            </button>
          </form>

          <p class="auth-card__footer">
            Don't have an account? <button type="button" class="link-btn toggle-view-btn" data-target="signup">Create one</button>
          </p>
        </div>

        <!-- ==================== SIGNUP VIEW ==================== -->
        <div class="auth-view auth-view--signup" id="view-signup">
          <div class="auth-card__header">
            <h1 class="auth-card__title">Create an account</h1>
            <p class="auth-card__sub">Start your 14-day free trial today</p>
          </div>

          <!-- Social login (Signup) -->
          <div class="social-grid">
            <button class="social-btn" type="button" aria-label="Sign up with Google">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            </button>
            <button class="social-btn" type="button" aria-label="Sign up with Apple">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.42 13.56c-.02-2.32 1.9-3.44 1.98-3.49-1.08-1.58-2.76-1.8-3.38-1.82-1.44-.14-2.81.85-3.55.85-.73 0-1.86-.83-3.05-.81-1.55.02-2.98.9-3.79 2.29-1.63 2.83-.42 7.02 1.18 9.32.78 1.13 1.7 2.4 2.91 2.36 1.17-.05 1.62-.76 3.04-.76 1.41 0 1.83.76 3.06.74 1.25-.02 2.05-1.15 2.81-2.27.88-1.28 1.25-2.52 1.27-2.58-.02-.01-2.43-.93-2.46-3.83zM14.28 5.61c.64-.78 1.08-1.87.96-2.96-1.01.04-2.2.67-2.86 1.45-.59.69-1.12 1.8-.98 2.87 1.12.09 2.23-.58 2.88-1.36z"/></svg>
            </button>
            <button class="social-btn" type="button" aria-label="Sign up with Facebook">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </button>
            <button class="social-btn" type="button" aria-label="Sign up with GitHub">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21.5c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"/></svg>
            </button>
          </div>

          <div class="divider">
            <span>or sign up with email</span>
          </div>

          <!-- Signup Form -->
          <form class="auth-form" id="signup-form" autocomplete="off">
            <div class="field" id="signup-name-field">
              <label class="field__label" for="signup-name">Full name</label>
              <div class="field__input-wrap">
                <svg class="field__icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M20 21a8 8 0 10-16 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <input type="text" id="signup-name" class="field__input" placeholder="John Doe" required autocomplete="name" />
              </div>
            </div>

            <div class="field" id="signup-email-field">
              <label class="field__label" for="signup-email">Email address</label>
              <div class="field__input-wrap">
                <svg class="field__icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                <input type="email" id="signup-email" class="field__input" placeholder="you@example.com" required autocomplete="email" />
              </div>
            </div>

            <div class="field" id="signup-password-field">
              <label class="field__label" for="signup-password">Password</label>
              <div class="field__input-wrap">
                <svg class="field__icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 11V7a4 4 0 018 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg>
                <input type="password" id="signup-password" class="field__input" placeholder="Create a password (min 6 chars)" required autocomplete="new-password" />
                <button type="button" class="field__toggle" aria-label="Toggle password visibility">
                  <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/></svg>
                  <svg class="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
              </div>
            </div>

            <button type="submit" class="btn-primary">
              <span class="btn-primary__text">Create account</span>
              <svg class="btn-primary__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <div class="btn-primary__loader"><span></span><span></span><span></span></div>
            </button>
          </form>

          <p class="auth-card__footer">
            Already have an account? <button type="button" class="link-btn toggle-view-btn" data-target="login">Sign in</button>
          </p>
        </div>

      </div>
    </main>

    <!-- Bottom text -->
    <footer class="page-footer" id="page-footer">
      <p>© 2025 Aura, Inc. · <a href="#" id="footer-privacy">Privacy</a> · <a href="#" id="footer-terms">Terms</a></p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
